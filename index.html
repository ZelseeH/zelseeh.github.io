<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lidia Haratyk ♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- OKŁADKA -->
  <section class="cover">
    <div class="cover-tape cover-tape--top"></div>
    <div class="cover-inner">
      <div class="cover-corner cover-corner--tl"></div>
      <div class="cover-corner cover-corner--tr"></div>
      <div class="cover-corner cover-corner--bl"></div>
      <div class="cover-corner cover-corner--br"></div>
      <p class="cover-eyebrow">album wspomnień</p>
      <h1 class="cover-title">Lidia<br>Haratyk</h1>
      <p class="cover-subtitle">chwile, które zawsze będą nasze</p>
      <div class="cover-divider"></div>
      <p class="cover-years" id="coverYears"></p>
    </div>
    <div class="cover-scroll-hint">↓ przewiń</div>
  </section>

  <!-- INTRO -->
  <section class="intro">
    <div class="intro-inner">
      <p class="intro-quote">"Niektóre chwile są zbyt piękne,<br>żeby istniały tylko w pamięci."</p>
    </div>
  </section>

  <!-- GALERIA -->
  <section class="gallery" id="gallery">
    <div class="gallery-header">
      <h2 class="section-title">Nasze wspomnienia</h2>
      <div class="filter-bar" id="filterBar"></div>
    </div>
    <div class="photo-grid" id="photoGrid">
      <!-- generowane przez JS -->
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" aria-label="Zamknij">✕</button>
    <button class="lightbox-prev" id="lightboxPrev" aria-label="Poprzednie">‹</button>
    <button class="lightbox-next" id="lightboxNext" aria-label="Następne">›</button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>

  <!-- STOPKA -->
  <footer class="site-footer">
    <div class="footer-heart">♡</div>
    <p class="footer-text" id="footerText"></p>
  </footer>

  <script src="zdjecia.js"></script>
  <script src="main.js"></script>
</body>
</html>
